kind = "web"
previewPath = "/"
title = "WireGuard Manager"
version = "1.0.0"
id = "artifacts/wg-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19122

[services.development]
run = "pnpm --filter @workspace/wg-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wg-manager", "run", "build" ]
publicDir = "artifacts/wg-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19122"
BASE_PATH = "/"
